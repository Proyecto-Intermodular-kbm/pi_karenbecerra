<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="css/style.css">
  <meta charset="UTF-8">
  <meta name="description" content="Consultora tecnológica especializada en desarrollo web">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto  |  NexusTechK</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="img/favicon/favicon.png" type="image/png">
</head>

<body class="contacto">

<header>
  <div class="logo">
    <img src="img/logo/logo.png" alt="Logo de la consultora NexusTechK">
  </div>

  <nav aria-label="Navegación principal">
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="proyecto-estrella.html">Proyecto</a></li>
      <li><a href="cronologia.html">Cronología</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>
</header>

  <main>
  <h1>Contacto</h1>

  <form action="#" method="post" novalidate="false">

    <!-- Nombre -->
    <label for="nombre">Nombre completo</label>
    <input
      type="text"
      id="nombre"
      name="nombre"
      required
      minlength="3"
      pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+"
      title="El nombre solo puede contener letras y espacios"
    >

    <!-- Email -->
    <label for="email">Correo electrónico</label>
    <input
      type="email"
      id="email"
      name="email"
      required
      title="Introduce un correo electrónico válido"
    >

    <!-- Select -->
    <label for="servicio">Servicio de interés</label>
    <select id="servicio" name="servicio" required>
      <option value="">Seleccione una opción</option>
      <option value="web">Desarrollo Web</option>
      <option value="cloud">Cloud Computing</option>
      <option value="ciberseguridad">Ciberseguridad</option>
    </select>

    <!-- Mensaje -->
    <label for="mensaje">Mensaje</label>
    <textarea
      id="mensaje"
      name="mensaje"
      required
      minlength="10"
      placeholder="Describe brevemente tu consulta"
    ></textarea>

    <!-- Checkbox -->
    <label class="checkbox">
      <input type="checkbox" required>
      Acepto la política de privacidad
    </label>

    <!-- Botón -->
    <button type="submit">Enviar</button>

  </form>
</main>

<footer>
  <p>&copy; 2025 NexusTechK</p>
  <p>
    <a href="#">LinkedIn</a> |
    <a href="#">Twitter</a> |
    <a href="#">Aviso Legal</a>
  </p>
</footer>

</body>

</html>
